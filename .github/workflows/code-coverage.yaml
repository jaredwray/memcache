name: code-coverage

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: pnpm/action-setup@v6
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: 'pnpm'
    - name: Install Dependencies
      run: pnpm install
    - name: Build
      run: pnpm build

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: pnpm/action-setup@v6
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: 'pnpm'
    - name: Install Dependencies
      run: pnpm install
    - name: Test Services
      run: pnpm test:services:start
    - name: Build
      run: pnpm build
    - name: Testing
      run: pnpm test

  coverage:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: pnpm/action-setup@v6
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: 'pnpm'
    - name: Install Dependencies
      run: pnpm install
    - name: Test Services
      run: pnpm test:services:start
    - name: Build
      run: pnpm build
    - name: Testing
      run: pnpm test
    - name: Code Coverage
      uses: codecov/codecov-action@v7
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
